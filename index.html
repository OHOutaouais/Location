<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0077cc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="OH Outaouais">

  <title>OH Outaouais - Trouvez votre agent(e) de location</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #eaeaea;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .box {
      background: white;
      width: 100%;
      max-width: 900px;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      max-width: 180px;
      height: auto;
      display: block;
      margin: 0 auto 10px auto;
    }

    input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      margin-top: 20px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    a {
      color: #0077cc;
      text-decoration: none;
    }

    #zone-installer {
      position: fixed;
      top: 12px;
      right: 15px;
      display: flex;
      gap: 8px;
      align-items: center;
      z-index: 999;
    }

    .icone-install {
      width: 36px;
      height: 36px;
      cursor: pointer;
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    .icone-install:hover { opacity: 1; }

    #btnInstaller {
      display: none;
      padding: 7px 14px;
      background: #0077cc;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    #popupIOS {
      display: none;
      position: fixed;
      top: 58px;
      right: 15px;
      width: 260px;
      padding: 15px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      font-size: 14px;
      color: #333;
      text-align: left;
      line-height: 1.8;
      z-index: 998;
    }
  </style>
</head>

<body>

<div class="wrapper">
  <div class="box">
    <img src="logo.png" alt="Logo" class="logo">
    <h2>Trouvez votre agent(e) de location / Find your rental agent</h2><br>
    <h3>Entrez votre nom de rue ou votre numéro civique / Enter your street name or civic number</h3>

<!-- Zone installer fixe haut droite -->
<div id="zone-installer">
  <!-- Icônes Android/iPhone (visiteur normal) -->
  <img id="icAndroid" src="android.png" alt="Android" class="icone-install" style="display:none" onclick="installerApp()" title="Ajouter sur Android">
  <img id="icIOS" src="iphone.png" alt="iPhone" class="icone-install" style="display:none" onclick="togglePopupIOS()" title="Ajouter sur iPhone">
  <!-- Bouton Installer (code=1 seulement) -->
  <button id="btnInstaller" onclick="installerApp()">📲 Installer</button>
</div>

<!-- Popup instructions iOS -->
<div id="popupIOS">
  <strong>Ajouter sur iPhone :</strong><br>
  1. Appuyez sur <strong>⎙</strong> (Partager, en bas de Safari)<br>
  2. Faites défiler → <strong>« Sur l'écran d'accueil »</strong><br>
  3. Appuyez sur <strong>« Ajouter »</strong>
</div>

    <input type="text" id="search" placeholder="Ex: Maloney, Gouin..." onkeyup="chercher()">

    <div id="resultat"></div>
  </div>
</div>

<script src="data.js"></script>

<script>
// 🔎 normalisation
function normaliser(str) {
  return str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// 🔤 format rue
function formatRue(rue) {
  return rue
    .split(" ")
    .map(m => m.charAt(0).toUpperCase() + m.slice(1))
    .join(" ");
}

// 🔍 recherche
function chercher() {
  const input = normaliser(document.getElementById("search").value);

  if (input.length < 1) {
    document.getElementById("resultat").innerHTML = "";
    return;
  }

  const resultats = locataires.filter(l =>
    normaliser(l.rue).includes(input)
  );

  let html = "";

  if (resultats.length > 0) {
    resultats.forEach(r => {
      html += `
        <div class="result">
          <strong>Rue :</strong> ${formatRue(r.rue)}<br>
          <strong>Agent :</strong> ${r.agent}<br>
          <strong>Téléphone :</strong> ${r.tel}<br>
          <strong>Email :</strong> 
          <a href="mailto:${r.email}">${r.email}</a><br>
          ${showCode ? `<strong>Code :</strong> ${getCode(r.agent)}` : ""}
        </div>
      `;
    });
  } else {
    html = "<p>Aucun résultat</p>";
  }

  document.getElementById("resultat").innerHTML = html;
}

// 📲 PWA - Installer
let deferredPrompt = null;

const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

if (!isStandalone) {
  if (showCode) {
    // code=1 → bouton "Installer" texte, pas d'icônes
    // Le bouton s'affiche seulement si le prompt est dispo (Android/Chrome)
    // Sur iOS avec code=1, on affiche quand même le bouton qui ouvrira le popup
    if (isIOS) {
      document.getElementById('btnInstaller').style.display = 'inline-block';
      document.getElementById('btnInstaller').onclick = togglePopupIOS;
    }
    // Android : affiché via beforeinstallprompt ci-dessous
  } else {
    // Visiteur normal → icônes
    if (isIOS) {
      document.getElementById('icIOS').style.display = 'inline-block';
    }
    // Android : affiché via beforeinstallprompt ci-dessous
  }
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!isStandalone) {
    if (showCode) {
      document.getElementById('btnInstaller').style.display = 'inline-block';
    } else {
      document.getElementById('icAndroid').style.display = 'inline-block';
    }
  }
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  document.getElementById('icAndroid').style.display = 'none';
  document.getElementById('btnInstaller').style.display = 'none';
});

function installerApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('icAndroid').style.display = 'none';
      document.getElementById('btnInstaller').style.display = 'none';
    });
  }
}

function togglePopupIOS() {
  const popup = document.getElementById('popupIOS');
  popup.style.display = popup.style.display === 'none' ? 'block' : 'none';
}

// 📲 Enregistrement du Service Worker (PWA)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/Location/sw.js').catch(() => {
      // Silencieux si ça échoue (ex: ouvert en local sans serveur)
    });
  });
}
</script>

</body>
</html>
