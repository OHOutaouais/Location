<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0077cc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="OH Outaouais">

  <title>OH Outaouais - Trouvez votre agent(e) de location</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #eaeaea;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .box {
      background: white;
      width: 100%;
      max-width: 900px;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      max-width: 180px;
      height: auto;
      display: block;
      margin: 0 auto 10px auto;
    }

    input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      margin-top: 20px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    a {
      color: #0077cc;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="wrapper">
  <div class="box">
    <img src="logo.png" alt="Logo" class="logo">
    <h2>Trouvez votre agent(e) de location / Find your rental agent</h2><br>
    <h3>Entrez votre nom de rue ou votre numéro civique / Enter your street name or civic number</h3>

    <input type="text" id="search" placeholder="Ex: Maloney, Gouin..." onkeyup="chercher()">

    <div id="resultat"></div>
  </div>
</div>

<script src="data.js"></script>

<script>
// 🔎 normalisation
function normaliser(str) {
  return str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// 🔤 format rue
function formatRue(rue) {
  return rue
    .split(" ")
    .map(m => m.charAt(0).toUpperCase() + m.slice(1))
    .join(" ");
}

// 🔍 recherche
function chercher() {
  const input = normaliser(document.getElementById("search").value);

  if (input.length < 1) {
    document.getElementById("resultat").innerHTML = "";
    return;
  }

  const resultats = locataires.filter(l =>
    normaliser(l.rue).includes(input)
  );

  let html = "";

  if (resultats.length > 0) {
    resultats.forEach(r => {
      html += `
        <div class="result">
          <strong>Rue :</strong> ${formatRue(r.rue)}<br>
          <strong>Agent :</strong> ${r.agent}<br>
          <strong>Téléphone :</strong> ${r.tel}<br>
          <strong>Email :</strong> 
          <a href="mailto:${r.email}">${r.email}</a><br>
          ${showCode ? `<strong>Code :</strong> ${getCode(r.agent)}` : ""}
        </div>
      `;
    });
  } else {
    html = "<p>Aucun résultat</p>";
  }

  document.getElementById("resultat").innerHTML = html;
}

// 📲 Enregistrement du Service Worker (PWA)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {
      // Silencieux si ça échoue (ex: ouvert en local sans serveur)
    });
  });
}
</script>

</body>
</html>
